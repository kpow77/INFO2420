<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Utah BackYard Birds - Graphics</title>

<style type="text/css">
	
	body {
	background-color: #ccffcc;
}
	}

	#thumbs, #image {
		width: 900px;
		text-align: center;
		margin: 0 auto 0 auto;
		color: #000;
	}

	#thumbs {
		margin-top: 10px;
	}

			
	#thumbs img {
		border: solid 1px #000;
		margin: 5px;
	}

	#image{
		height:500px;
	}

	.instructions{
		font-style:italic;
	}

</style>

<script language="JavaScript" type="text/javascript">

var PrintButton1 = new Image();
    var PrintButton2 = new Image();
    var logo1 = new Image();
    var logo2 = new Image();

    if (document.images) {
        PrintButton1.src = "images/print5.gif";
        PrintButton2.src = "images/print6.gif";
        logo1.src = "images/logo1.jpg";
        logo2.src = "images/logo2.jpg";
    }

    var imgArray = [
        "Image1Lg.jpg",
        "Image2Lg.jpg",
        "Image3Lg.jpg",
        "Image4Lg.jpg"
    ];

    var titleArray = [
        "Bald Eagle",
        "Group of Geese",
        "Heron",
        "2 Pelicans"
    ];

    var imgPath = "images/";

    function swapImage(imgID) {
        document.getElementById("theImage").src = imgPath + imgArray[imgID];
        document.getElementById("bottomText").innerHTML = titleArray[imgID];
    }

    function preloadImages() {
        for (var i = 0; i < imgArray.length; i++) {
            var tmpImg = new Image();
            tmpImg.src = imgPath + imgArray[i];
        }
    }

    window.onload = preloadImages;


</script>


</head>
<body  onload="preloadImages()">

<div align="center">

<div id="print">
	<a href="" onMouseOver="document.PrintButton.src=PrintButton2.src;"
	onMouseOut="document.PrintButton.src=PrintButton1.src;">

	<img src="Images/print5.gif" width="250" height="50" 
	name="PrintButton" alt="PrintButton" style="border:none;"/>

	</a>
</div>


<div id="logo">
	
	<a href="logo.html" onMouseOver="document.logo.src=logo2.src;"
	onMouseOut="document.logo.src=logo1.src;">

	<img src="Images/logo1.jpg" width="150" height="175" 
	name="logo" alt="logo" style="border:none;"/>

	</a>
</div>

<br />
<br />
<br />
<br />


<div id="thumbs">
		<img src="images/Image1Sm.jpg" alt="Bald Eagle" onmouseover="swapImage(0);" />
		<img src="images/Image2Sm.jpg" alt="Geese" onmouseover="swapImage(1);" />
		<img src="images/Image3Sm.jpg" alt="Heron" onmouseover="swapImage(2);" />
		<img src="images/Image4Sm.jpg" alt=" 2 Pelicans" onmouseover="swapImage(3);" />
		
</div>

	<div id="image">

		<img id="theImage" src="images/Image1Lg.jpg" alt="Bald Eagle" />
		<h3 id="bottomText">Eagle</h3>
	</div>

<img src="Images/2colback.jpg">

<br />
<br />
<br />
<br />



</div>

<p>
    <a href="http://validator.w3.org/check?uri=referer"><img
      src="http://www.w3.org/Icons/valid-xhtml10" alt="Valid XHTML 1.0 Transitional" height="31" width="88" /></a>
</p>
  

</body>
</html>
